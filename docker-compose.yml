services:
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: pizza52-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        required: true
    networks:
      - pizza52_net
    env_file:
      - path: ./.env.prod
        required: true
    ports:
      - target: 8000
        published: 8000
        host_ip: 127.0.0.1
        app_protocol: http
    command:
      - "uvicorn"
      - "main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -iq ok"]
      retries: 3
      interval: 10s
      timeout: 5s
      start_period: 10s
    volumes:
      - backend_static:/app/static

  db:
    image: postgres:15
    container_name: pizza52-postgres
    restart: unless-stopped
    networks:
      - pizza52_net
    env_file:
      - path: ./.env.prod
        required: true
    ports:
      - target: 5432
        published: 5432
        host_ip: 127.0.0.1
    volumes:
      - target: /var/lib/postgresql/data
        source: postgres_data
        type: volume
    healthcheck:
      test: ["CMD", "pg_isready", "-q"]
      retries: 3
      timeout: 10s
      interval: 30s
      start_period: 10s

  nginx-load-balancer:
    image: nginx:1.27-alpine
    container_name: nginx-load-balancer
    restart: unless-stopped
    networks:
      - pizza52_net
    depends_on:
      frontend:
        condition: service_healthy
        required: true
    ports:
      - target: 80
        published: 80
        app_protocol: http
        host_ip: 0.0.0.0
      - target: 443
        published: 443
        app_protocol: https
        host_ip: 0.0.0.0
    volumes:
      - target: /etc/nginx/nginx.conf
        source: ./nginx/nginx.conf
        type: bind
      - target: /etc/nginx/ssl/cert.pem
        source: ./nginx/ssl/cert.pem
        type: bind
      - target: /etc/nginx/ssl/key.pem
        source: ./nginx/ssl/key.pem
        type: bind
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/health | grep -iq ok"]
      retries: 3
      interval: 10s
      timeout: 5s
      start_period: 10s
  
  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    container_name: pizza52-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
        required: true
    networks:
      - pizza52_net
    ports:
      - target: 80
        published: 8080
        host_ip: 127.0.0.1
        app_protocol: http
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80"]
      retries: 3
      interval: 10s
      timeout: 5s
      start_period: 10s

volumes:
  postgres_data:
  backend_static:

networks:
  pizza52_net:
    driver: bridge
